name: Market Sim Trader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "JP, US, ALL, REVIEW"
        required: true
        default: "ALL"
        type: choice
        options:
          - JP
          - US
          - ALL
          - REVIEW
  schedule:
    # 16:10 Japan time, Monday-Friday, after Tokyo close.
    - cron: "10 7 * * 1-5"
    # 07:15 Japan time, Tuesday-Saturday, after New York close.
    - cron: "15 22 * * 1-5"
    # 22:30 Japan time, Monday-Saturday nightly review.
    - cron: "30 13 * * 1-6"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve mode
        id: mode
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            case "${{ github.event.schedule }}" in
              "10 7 * * 1-5") MODE="JP" ;;
              "15 22 * * 1-5") MODE="US" ;;
              "30 13 * * 1-6") MODE="REVIEW" ;;
              *) MODE="ALL" ;;
            esac
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Run paper trading task
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          python -m market_sim.cli init
          python -m market_sim.cli sync-universe --markets US JP
          if [ "${{ steps.mode.outputs.mode }}" = "REVIEW" ]; then
            python -m market_sim.cli review
          elif [ "${{ steps.mode.outputs.mode }}" = "ALL" ]; then
            python -m market_sim.cli run --markets US JP
          else
            python -m market_sim.cli run --markets "${{ steps.mode.outputs.mode }}"
          fi
          python -m market_sim.cli export --output docs

      - name: Commit updated dashboard state
        run: |
          git config user.name "market-sim-bot"
          git config user.email "market-sim-bot@users.noreply.github.com"
          git add data/trader.sqlite docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market simulation state"
            git pull --rebase
            git push
          fi
